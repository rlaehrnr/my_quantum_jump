name: KR Monthly Archive

on:
  schedule:
    - cron: '0 0 1 * *'  # 💡 매월 1일 UTC 0시 = 한국 시간 매월 1일 오전 9시
  workflow_dispatch:

jobs:
  generate-kr-archive:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader requests pykrx

    - name: 4. 🇰🇷 한국 월간 아카이브 생성 스크립트 실행
      run: python update_monthly_kr.py

    - name: 5. 깃허브에 덮어쓰기
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [KR] 매월 1일 한국 모멘텀 아카이브 자동 생성 완료" && git push)
