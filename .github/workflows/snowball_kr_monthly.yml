name: Snowball KR Monthly Update

on:
  schedule:
    - cron: '0 0 1 * *'   # 💡 매월 1일 UTC 0시 = 한국 시간 매월 1일 오전 9시
  workflow_dispatch:        # 수동 실행 가능 (지금 처음 데이터 채울 때 사용)

jobs:
  update-snowball-kr:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader yfinance requests

    - name: 4. 🇰🇷 코 삼성(국내 ETF) 데이터 수집
      run: python update_snowball_kr.py

    - name: 5. 깃허브에 커밋
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/snowball_kr/
        if git diff --quiet && git diff --staged --quiet; then
          echo "변경 없음 — 커밋 건너뜀"
        else
          git commit -m "🤖 [Snowball KR] 코 삼성 국내 ETF 월간 데이터 자동 업데이트"
          # push 충돌 대비: 원격이 앞서갔으면 rebase 후 재시도 (최대 5회)
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin main; then
              echo "push 성공 (시도 $i)"; break
            fi
            echo "push 재시도 $i/5 ..."; sleep 5
          done
        fi
