name: Monthly Archive Generator

on:
  schedule:
    # 매월 1일 KST 아침 7시 (UTC 22시 전날)
    - cron: '0 22 28-31 * *' 
  workflow_dispatch:

jobs:
  generate-monthly-archive:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 평일 및 1일 체크 로직 (매월 1일에만 작동하도록 조건문)
      id: date_check
      run: |
        if [ "$(date +'%d')" != "01" ]; then
          echo "오늘은 매월 1일이 아닙니다. 스킵합니다."
          echo "run_job=false" >> $GITHUB_ENV
        else
          echo "run_job=true" >> $GITHUB_ENV
        fi

    - name: 3. 파이썬 환경 세팅
      if: env.run_job == 'true'
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 4. 필요한 라이브러리 설치
      if: env.run_job == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader

    - name: 5. 월간 아카이브 생성 스크립트 실행
      if: env.run_job == 'true'
      run: python update_monthly.py

    - name: 6. 깃허브에 새로운 파일 덮어쓰기 (Commit & Push)
      if: env.run_job == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [매월 1일] 신규 모멘텀 아카이브 파일 자동 생성 완료" && git push)
