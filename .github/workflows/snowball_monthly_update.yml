name: Snowball Data Update (Daily)

on:
  schedule:
    # 💡 매월 1일 UTC 06:00 = 한국 시간 매월 1일 오후 3시
    #    (미국 시장 전월 말 마감 데이터가 반영된 후 실행)
    - cron: '0 22 * * *'   # 매일 UTC 22:00 (미국 마감 후) = KST 익일 07:00
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  update-snowball:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy finance-datareader yfinance requests beautifulsoup4 lxml openpyxl

    - name: 4. 스노우볼 데이터 업데이트 스크립트 실행
      run: python update_snowball.py

    - name: 5. 깃허브에 변경사항 커밋 & 푸시
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/snowball/
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [Snowball] 데이터 자동 갱신 (월말 자료·일별 재조정 반영)" && git push)
