name: US Daily Momentum Update

on:
  schedule:
    - cron: '0 23 * * *'  # 💡 UTC 23시 = 한국 시간 다음날 아침 8시 (미국장 마감 후)
  workflow_dispatch:

jobs:
  update-us-data:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader requests

    - name: 4. 🇺🇸 미국 데일리 수집 스크립트 실행
      run: python update_daily_us.py

    - name: 5. 깃허브에 덮어쓰기
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "🤖 [US] 미국 데일리 데이터 자동 갱신 완료" || echo "No changes to commit"
          git pull origin main --rebase
          git push
