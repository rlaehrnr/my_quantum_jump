name: VIX Daily Update

on:
  schedule:
    # 평일 UTC 22:00 (미국 증시 마감 후) = 한국시간 익일 07:00
    #   VIX는 미국장 마감 뒤 확정되므로 마감 후 수집한다.
    - cron: '0 22 * * 1-5'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  update-vix:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      # 아래 5개는 GitHub 저장소 Settings → Secrets and variables → Actions 에 등록.
      # 시크릿이 없으면 데이터 갱신만 하고 메일은 조용히 생략된다.
      VIX_SMTP_USER: ${{ secrets.VIX_SMTP_USER }}
      VIX_SMTP_PASS: ${{ secrets.VIX_SMTP_PASS }}
      VIX_ALERT_TO:  ${{ secrets.VIX_ALERT_TO }}
      VIX_SMTP_HOST: ${{ secrets.VIX_SMTP_HOST }}
      VIX_SMTP_PORT: ${{ secrets.VIX_SMTP_PORT }}

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v4

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy yfinance requests

    - name: 4. VIX 업데이트 + 35 돌파 알림
      run: python update_vix.py

    - name: 5. 깃허브에 변경사항 커밋 & 푸시
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add "data/vix data.csv"
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [VIX] 일별 데이터 자동 업데이트" && git push)
