name: KR Gold Daily Update

on:
  schedule:
    - cron: '0 14 * * 1-5'   # 💡 UTC 14시 = 한국 시간 밤 11시 (평일, 한국장 마감 후)
  workflow_dispatch:

jobs:
  update-gold-data:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul

    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader yfinance

    - name: 4. 🥇 KRX 금(411060) 수집 스크립트 실행
      run: python update_gold_kr.py

    - name: 5. 깃허브에 커밋
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/krx_gold_recent.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [KR] KRX 금(411060) 데이터 자동 갱신" && git push)
