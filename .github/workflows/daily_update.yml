name: Daily Momentum Update

on:
  schedule:
    # 💡 한국 시간(KST) 오전 7시 = 세계 표준시(UTC) 기준 전날 밤 22시
    - cron: '0 22 * * *'
  workflow_dispatch: # 깃허브 웹사이트에서 수동으로 버튼을 눌러 실행할 수 있게 해줌

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader yfinance

    - name: 4. 데일리 수집 스크립트 실행
      run: python update_daily.py

    - name: 5. 변경된 데이터 깃허브에 덮어쓰기 (Commit & Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/momentum_data_daily.csv
        # 변경된 내용이 있을 때만 저장하고 Push 합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 데일리 모멘텀 자동 업데이트 완료" && git push)
