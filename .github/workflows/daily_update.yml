name: Daily Momentum Update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 필요한 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader

    - name: 4. 데일리 수집 및 월간 수익률 갱신 스크립트 실행
      run: python update_daily.py

    - name: 5. 변경된 모든 데이터 깃허브에 덮어쓰기 (Commit & Push)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 데일리 생성 및 4월 월간 수익률 자동 갱신 완료" && git push)
