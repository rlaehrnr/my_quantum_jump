name: KR Daily Momentum Update

on:
  schedule:
    - cron: '0 14 * * *'  # 💡 UTC 14시 = 한국 시간 밤 11시 (한국장 마감 후)
  workflow_dispatch:

jobs:
  update-kr-data:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 파이썬 환경 세팅
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader requests pykrx

    - name: 4. 🇰🇷 한국 데일리 수집 스크립트 실행
      run: python update_daily_kr.py

    - name: 5. 깃허브에 덮어쓰기
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add .
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [KR] 한국 데일리 데이터 자동 갱신 완료" && git push)
