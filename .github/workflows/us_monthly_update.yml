name: US Monthly Archive

on:
  schedule:
    - cron: '15 23 28-31 * *'  # 💡 UTC 23시 15분 = 한국 시간 아침 8시 15분 (데일리 로봇과 15분 간격 두기)
  workflow_dispatch:

jobs:
  generate-us-archive:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    
    steps:
    - name: 1. 저장소 코드 불러오기
      uses: actions/checkout@v3

    - name: 2. 1일 체크 로직 (예약 실행은 매월 1일만 / 수동 실행은 항상 허용)
      id: date_check
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "수동 실행(workflow_dispatch): 날짜 가드 없이 진행합니다."
          echo "run_job=true" >> $GITHUB_ENV
        elif [ "$(date +'%d')" != "01" ]; then
          echo "오늘은 매월 1일이 아닙니다. 스킵합니다."
          echo "run_job=false" >> $GITHUB_ENV
        else
          echo "run_job=true" >> $GITHUB_ENV
        fi

    - name: 3. 파이썬 환경 세팅
      if: env.run_job == 'true'
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 4. 라이브러리 설치
      if: env.run_job == 'true'
      run: |
        python -m pip install --upgrade pip
        pip install pandas finance-datareader requests

    - name: 5. 🇺🇸 미국 월간 아카이브 생성 스크립트 실행
      if: env.run_job == 'true'
      run: python update_monthly_us.py

    - name: 6. 깃허브에 덮어쓰기
      if: env.run_job == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add .
        git commit -m "🤖 [US] 매월 1일 미국 모멘텀 아카이브 자동 생성 완료" || echo "No changes to commit"
        git pull origin main --rebase
        git push
